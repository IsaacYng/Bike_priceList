<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bajaj Showroom | Official Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <span class="text-2xl font-black text-red-600 tracking-tighter">BAJAJ</span>
                </div>

                <div class="hidden md:flex space-x-8 font-semibold text-gray-600">
                    <a href="#" class="hover:text-red-600">Home</a>
                    <a href="#prices" class="hover:text-red-600">Price List</a>
                    <a href="#" class="hover:text-red-600">Contact</a>
                </div>

                <button id="menu-btn" class="md:hidden text-2xl p-2">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[60] hidden backdrop-blur-sm transition-opacity"></div>
    <div id="drawer" class="fixed top-0 left-0 w-72 h-full bg-white z-[70] shadow-2xl transform -translate-x-full transition-transform duration-300">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <span class="font-bold text-xl uppercase tracking-widest text-red-600">Menu</span>
                <button id="close-btn" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div class="flex flex-col space-y-6 font-medium text-lg">
                <a href="#" class="flex items-center space-x-4 p-2 rounded-lg hover:bg-red-50 hover:text-red-600 transition"><i class="fa-solid fa-house"></i> <span>Home</span></a>
                <a href="#prices" class="flex items-center space-x-4 p-2 rounded-lg hover:bg-red-50 hover:text-red-600 transition"><i class="fa-solid fa-motorcycle"></i> <span>Price List</span></a>
                <a href="#" class="flex items-center space-x-4 p-2 rounded-lg hover:bg-red-50 hover:text-red-600 transition"><i class="fa-solid fa-phone"></i> <span>Contact</span></a>
            </div>
        </div>
    </div>

    <section class="relative bg-slate-900 text-white overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-black to-transparent z-10"></div>
        <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Bajaj Bike">
        <div class="relative z-20 max-w-7xl mx-auto px-4 py-24 sm:py-32">
            <h1 class="text-4xl md:text-7xl font-extrabold mb-6">Unleash the <br><span class="text-red-500">Thrill of Riding.</span></h1>
            <p class="max-w-xl text-lg text-slate-300 mb-8">Browse the latest 2026 price list and find your perfect match. Authorized partner in Phidim.</p>
            <a href="#prices" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold transition inline-block">View Price List</a>
        </div>
    </section>

    <main id="prices" class="max-w-7xl mx-auto px-4 py-20">
        <div class="mb-12 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold">Latest Models</h2>
                <div class="h-1 w-20 bg-red-600 mt-2"></div>
            </div>
        </div>
    <section id="Price_list" class="price_section">
        <h2 class="section_title">Price List</h2>

        <div class="search-box-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search bikes here...">
        </div>

        <div id="bike-container" class="bike-grid">
            <p class="loading-text">Connecting to database...</p>
        </div>
    </section>
          </div>
        </div>
    </main>

    <footer class="bg-white border-t py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-500 mb-6">Authorized Bajaj Showroom &copy; 2026</p>
            <div class="flex justify-center space-x-8 text-2xl text-gray-400">
                <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" class="hover:text-red-600 transition"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Drawer Controls
        const btn = document.getElementById('menu-btn');
        const close = document.getElementById('close-btn');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');

        const toggle = () => {
            drawer.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        btn.addEventListener('click', toggle);
        close.addEventListener('click', toggle);
        overlay.addEventListener('click', toggle);
    </script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>

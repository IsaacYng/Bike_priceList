<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-600">BAJAJ <span class="text-gray-800 underline decoration-red-500">SHOWROOM</span></h1>
            
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#" class="hover:text-red-600 transition">Home</a>
                <a href="#" class="hover:text-red-600 transition">Price List</a>
                <a href="#" class="hover:text-red-600 transition">Stock</a>
            </div>

            <button id="drawer-open" class="md:hidden text-2xl">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>
    </nav>

    <div id="drawer-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden"></div>
    <div id="app-drawer" class="fixed top-0 left-0 w-64 h-full bg-white z-[70] transform -translate-x-full transition-transform duration-300 ease-in-out">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <span class="font-bold text-xl">Menu</span>
                <button id="drawer-close" class="text-2xl">&times;</button>
            </div>
            <div class="flex flex-col space-y-4">
                <a href="#" class="text-lg border-b pb-2">Home</a>
                <a href="#" class="text-lg border-b pb-2">Price List</a>
                <a href="#" class="text-lg border-b pb-2">Stock</a>
            </div>
        </div>
    </div>

    <header class="relative bg-gray-900 h-[400px] flex items-center justify-center text-white text-center">
        <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1558981403-c5f91cbba527?q=80&w=2070')] bg-cover bg-center"></div>
        <div class="relative z-10 px-4">
            <h2 class="text-4xl md:text-6xl font-extrabold mb-4">Latest Price List</h2>
            <p class="text-lg md:text-xl text-gray-300">Updated daily for our Phidim Showroom.</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="price-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-10 mt-20">
        <div class="container mx-auto px-4 text-center">
            <p class="mb-4">&copy; 2026 Authorized Bajaj Partner. All Rights Reserved.</p>
            <div class="flex justify-center space-x-6 text-xl">
                <i class="fa-brands fa-facebook hover:text-blue-500 cursor-pointer"></i>
                <i class="fa-brands fa-whatsapp hover:text-green-500 cursor-pointer"></i>
            </div>
        </div>
    </footer>

    <script>
        // Drawer Logic
        const openBtn = document.getElementById('drawer-open');
        const closeBtn = document.getElementById('drawer-close');
        const drawer = document.getElementById('app-drawer');
        const overlay = document.getElementById('drawer-overlay');

        const toggleDrawer = () => {
            drawer.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        openBtn.addEventListener('click', toggleDrawer);
        closeBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);
    </script>
</body>
</html>

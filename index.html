<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG - Admin Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { @apply border-indigo-600 text-indigo-600 border-b-2; }
    </style>
</head>
<body class="h-full">

<section id="login-section" class="flex min-h-full items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-100 p-8">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 mb-4 shadow-inner">
                <img src="favicon.png" class="w-10 h-10 object-contain" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Admin Login</h2>
            <p class="text-slate-500 text-sm mt-1">Manage your inventory & finance</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i class="fa fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="email" id="email" placeholder="Email Address" 
                    class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
            </div>

            <div class="relative">
                <i class="fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="password" id="pass" placeholder="Password"
                    class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400">
            </div>
        </div>

        <button id="loginBtn" class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            Sign In <i class="fa fa-arrow-right text-xs"></i>
        </button>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-100"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold tracking-widest">OR</span></div>
        </div>

        <button id="googleBtn" class="w-full flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition-all font-semibold text-slate-600 active:scale-[0.98]">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" class="w-5 h-5">
            Continue with Google
        </button>
    </div>
</section>


<section id="admin-section" class="hidden min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <img src="favicon.png" class="w-8 h-8" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
            <div>
                <h3 id="greetingText" class="text-lg font-bold text-slate-800 leading-tight">Welcome!</h3>
                <p id="currentDate" class="text-[11px] text-slate-400 font-bold uppercase tracking-wider"></p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-right">
                <span id="headerUserName" class="block text-sm font-bold text-slate-700">Admin User</span>
                <span id="dispRole" class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-bold uppercase">Staff</span>
            </div>
            <button id="logoutBtn" class="h-10 w-10 flex items-center justify-center rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-300">
                <i class="fa fa-power-off"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white px-8 flex gap-8 border-b border-slate-200 shadow-sm">
        <button id="nav-price" class="nav-item tab-active py-4 text-sm font-bold transition-all" onclick="switchTab('tab-price')">Price Setup</button>
        <button id="nav-stock" class="nav-item py-4 text-sm font-medium text-slate-500 hover:text-indigo-600 transition-all" onclick="switchTab('tab-stock')">Stock Management</button>
    </nav>

    <main class="p-8 max-w-7xl mx-auto w-full space-y-8">
        
        <div id="tab-price" class="tab-pane block animate-in fade-in duration-500">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="p-2 bg-indigo-50 rounded-lg"><i class="fa fa-tag text-indigo-600 text-sm"></i></span>
                    Master Price Configuration
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Model Name</label>
                        <input type="text" id="mName" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50/50 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">MRP Price</label>
                        <input type="number" id="mPrice" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50/50 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Cash Insurance</label>
                        <input type="number" id="mNormalIns" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50/50 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Finance Insurance</label>
                        <input type="number" id="mFinanceIns" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50/50 transition-all">
                    </div>
                    <div class="space-y-1.5 md:col-span-2 lg:col-span-4">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Image URL</label>
                        <input type="text" id="mImg" class="w-full border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50/50 transition-all" placeholder="https://...">
                    </div>
                </div>

                <button id="saveModelBtn" class="mt-8 bg-slate-900 text-white px-10 py-3.5 rounded-xl font-bold shadow-xl hover:bg-indigo-600 transition-all active:scale-[0.98]">
                    Save to Master List
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa fa-list-ul text-indigo-500"></i> Master Price List
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-widest border-b border-slate-200">
                                <th class="px-8 py-4">Vehicle</th>
                                <th class="px-8 py-4">Base Price</th>
                                <th class="px-8 py-4">Insurance (Cash)</th>
                                <th class="px-8 py-4">Insurance (Fin)</th>
                                <th class="px-8 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="masterTableBody" class="divide-y divide-slate-100 text-sm text-slate-600">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-stock" class="tab-pane hidden animate-in fade-in duration-500">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                    <span class="p-2 bg-emerald-50 rounded-lg"><i class="fa fa-plus-circle text-emerald-600 text-sm"></i></span>
                    Register New Stock
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Select Model</label>
                        <select id="stockModelSelect" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Registration No</label>
                        <input type="text" id="sRegNo" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Chassis No</label>
                        <input type="text" id="sChassis" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Engine No</label>
                        <input type="text" id="sEngine" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">Color</label>
                        <input type="text" id="sColor" class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>

                <button id="saveStockBtn" class="mt-8 bg-emerald-600 text-white px-10 py-3.5 rounded-xl font-bold shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all active:scale-[0.98]">
                    Add to Inventory
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa fa-warehouse text-emerald-500"></i> Warehouse Stock
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-widest border-b border-slate-200">
                                <th class="px-8 py-4">Model & Price</th>
                                <th class="px-8 py-4">Chassis No</th>
                                <th class="px-8 py-4">Engine No</th>
                                <th class="px-8 py-4">Registration</th>
                                <th class="px-8 py-4">Color</th>
                                <th class="px-8 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody" class="divide-y divide-slate-100 text-sm text-slate-600"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</section>

<script>
    // Tab Switching Logic
    function switchTab(id) {
        document.querySelectorAll('.tab-pane').forEach(tab => tab.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.classList.remove('tab-active', 'text-indigo-600');
            nav.classList.add('text-slate-500', 'font-medium');
        });

        const activeNav = (id === 'tab-price') ? 'nav-price' : 'nav-stock';
        document.getElementById(activeNav).classList.add('tab-active', 'text-indigo-600');
        document.getElementById(activeNav).classList.remove('text-slate-500', 'font-medium');
    }
    
    // Auto-Date
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>

<script type="module" src="script.js"></script>
</body>
</html>

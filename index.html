<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG - Admin Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body class="h-full">

<section id="login-section" class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 space-y-8">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-4" src="favicon.png" alt="Go YNG" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
            <h2 class="text-3xl font-bold text-gray-900">Admin Login</h2>
            <p class="text-gray-500 mt-2">Manage your inventory & finance</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i class="fa fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
                <input type="email" id="email" placeholder="Email Address" 
                       class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>

            <div class="relative">
                <i class="fa fa-lock absolute left-3 top-3.5 text-gray-400"></i>
                <input type="password" id="pass" placeholder="Password" 
                       class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>
        </div>

        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-200">
            Sign In <i class="fa fa-arrow-right text-sm"></i>
        </button>

        <div class="relative flex items-center justify-center my-6">
            <div class="border-t border-gray-200 w-full"></div>
            <span class="bg-white px-4 text-sm text-gray-400 absolute">OR</span>
        </div>

        <button id="googleBtn" class="w-full border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium py-3 rounded-lg flex items-center justify-center gap-3 transition-all">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" class="w-5 h-5">
            Continue with Google
        </button>
    </div>
</section>


<section id="admin-section" style="display:none;" class="min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-30">
        <div>
            <h3 id="greetingText" class="text-xl font-bold text-gray-800">Welcome Back!</h3>
            <p id="currentDate" class="text-xs text-gray-500 font-medium uppercase tracking-wider"></p>
        </div>

        <div class="flex items-center gap-4">
            <span id="headerUserName" class="hidden md:inline font-medium text-gray-700"></span>
            <button id="logoutBtn" class="p-2.5 text-red-500 hover:bg-red-50 rounded-full transition-colors">
                <i class="fa fa-power-off text-lg"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white border-b border-gray-200 px-6 overflow-x-auto">
        <div class="flex gap-8">
            <button class="nav-item border-b-2 border-blue-600 text-blue-600 py-4 font-semibold text-sm transition-all whitespace-nowrap active" 
                    onclick="switchTab('tab-price', this)">
                <i class="fa fa-tag mr-2"></i>Price Setup
            </button>
            <button class="nav-item border-b-2 border-transparent text-gray-500 hover:text-gray-700 py-4 font-semibold text-sm transition-all whitespace-nowrap" 
                    onclick="switchTab('tab-stock', this)">
                <i class="fa fa-warehouse mr-2"></i>Stock Management
            </button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">

        <div id="tab-price" class="tab-pane active space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fa fa-cog text-blue-500"></i> Master Price Setup
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Model Name</label>
                        <input type="text" id="mName" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">MRP Price</label>
                        <input type="number" id="mPrice" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Cash Insurance</label>
                        <input type="number" id="mNormalIns" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Finance Insurance</label>
                        <input type="number" id="mFinanceIns" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="space-y-1 md:col-span-2 lg:col-span-4">
                        <label class="text-xs font-bold text-gray-500 uppercase">Image URL</label>
                        <input type="text" id="mImg" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <button id="saveModelBtn" class="mt-6 bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-lg font-semibold transition-all">
                    Save to Master List
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                        <i class="fa fa-list text-blue-500"></i> Master Price List
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Image</th>
                                <th class="px-6 py-4">Model</th>
                                <th class="px-6 py-4">Price</th>
                                <th class="px-6 py-4">Cash Ins.</th>
                                <th class="px-6 py-4">Fin. Ins.</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="masterTableBody" class="divide-y divide-gray-100 text-sm text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>


        <div id="tab-stock" class="tab-pane space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fa fa-plus-circle text-emerald-500"></i> Add Bike to Stock
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Select Model</label>
                        <select id="stockModelSelect" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500 focus:outline-none bg-white"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Registration No</label>
                        <input type="text" id="sRegNo" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Chassis No</label>
                        <input type="text" id="sChassis" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Engine No</label>
                        <input type="text" id="sEngine" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Color</label>
                        <input type="text" id="sColor" class="w-full border border-gray-200 rounded-lg p-2.5">
                    </div>
                </div>

                <button id="saveStockBtn" class="mt-6 bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-lg font-semibold transition-all shadow-lg shadow-emerald-100">
                    Add Stock
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                    <h3 class="font-bold text-gray-800 flex items-center gap-2">
                        <i class="fa fa-warehouse text-emerald-500"></i> Live Stock Inventory
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 text-xs uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Model</th>
                                <th class="px-6 py-4">Price</th>
                                <th class="px-6 py-4">Chassis</th>
                                <th class="px-6 py-4">Engine</th>
                                <th class="px-6 py-4">Reg No</th>
                                <th class="px-6 py-4">Color</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</section>

<script type="module" src="script.js"></script>

<script>
function switchTab(id, btn) {
    // Hide all panes
    document.querySelectorAll('.tab-pane').forEach(tab => {
        tab.classList.remove('active');
    });

    // Reset all buttons
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.classList.remove('border-blue-600', 'text-blue-600');
        nav.classList.add('border-transparent', 'text-gray-500');
    });

    // Show selected pane
    document.getElementById(id).classList.add('active');

    // Style active button
    btn.classList.remove('border-transparent', 'text-gray-500');
    btn.classList.add('border-blue-600', 'text-blue-600');
}
</script>

</body>
</html>

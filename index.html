<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E Spurt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-[40px] shadow-xl flex flex-col md:flex-row max-w-5xl w-full overflow-hidden p-4 md:p-6 gap-8">
        
        <div class="bg-[#FF8A3D] rounded-[32px] md:w-1/2 p-8 md:p-12 flex flex-col justify-between relative overflow-hidden min-h-[300px]">
            <div class="z-10">
                <h1 class="text-white text-4xl font-bold leading-tight mb-4">
                    Simplify management with our dashboard.
                </h1>
                <p class="text-white/80 text-sm max-w-xs">
                    Access your e-commerce management system with our user-friendly admin dashboard.
                </p>
            </div>
            
            <div class="mt-auto flex justify-center z-10">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/business-management-4348574-3619114.png" 
                     alt="Dashboard Illustration" class="w-full h-auto max-w-[280px] object-contain">
            </div>
            
            <div class="absolute -bottom-10 -right-10 w-64 h-64 bg-orange-400 rounded-full opacity-30 blur-3xl"></div>
        </div>

        <div class="md:w-1/2 flex flex-col justify-center px-4 py-6 md:px-10">
            
            <div class="mb-8">
                <div class="flex items-center gap-2 mb-6">
                    <div class="bg-[#FF8A3D] p-2 rounded-lg">
                        <i class="fas fa-shopping-cart text-white"></i>
                    </div>
                    <span class="text-2xl font-bold text-gray-800">E Spurt</span>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 mb-1">Welcome Back</h2>
                <p class="text-gray-400 text-sm">Please login to your account</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" 
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400/20 focus:border-orange-400 transition-all text-sm">
                </div>
                
                <div class="relative">
                    <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" 
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400/20 focus:border-orange-400 transition-all text-sm">
                    <button id="togglePass" class="absolute right-4 top-[38px] text-gray-400 hover:text-gray-600">
                        <i class="far fa-eye"></i>
                    </button>
                </div>

                <div class="text-right">
                    <a href="#" class="text-xs text-gray-400 hover:text-orange-500 font-medium">Forgot password?</a>
                </div>

                <button id="loginBtn" class="w-full bg-[#FF8A3D] text-white font-bold py-4 rounded-xl hover:bg-[#e67a2e] transition-all shadow-lg shadow-orange-100 mt-2">
                    Login
                </button>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-100"></span></div>
                    <div class="relative flex justify-center text-xs"><span class="bg-white px-4 text-gray-400 uppercase tracking-wider">Or Login with</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 border border-gray-100 py-3 rounded-xl hover:bg-gray-50 transition-all">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                        <span class="text-sm font-medium text-gray-700">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 border border-gray-100 py-3 rounded-xl hover:bg-gray-50 transition-all">
                        <i class="fab fa-facebook text-blue-600 text-xl"></i>
                        <span class="text-sm font-medium text-gray-700">Facebook</span>
                    </button>
                </div>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Don't have an account? <a href="#" class="text-orange-500 font-semibold hover:underline">Signup</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module" src="security.js"></script>
</body>
</html>

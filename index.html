<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go! YNG - Admin Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-item.active {
            background-color: #f1f5f9;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<section id="login-section" class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <img src="favicon.png" alt="Go YNG" class="w-16 h-16 mx-auto mb-4 rounded-xl shadow-sm"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
            <h2 class="text-2xl font-bold text-slate-900">Admin Login</h2>
            <p class="text-slate-500 text-sm">Manage your inventory & finance</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <i class="fa fa-envelope absolute left-4 top-4 text-slate-400"></i>
                <input type="email" id="email" placeholder="Email Address" 
                       class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="relative">
                <i class="fa fa-lock absolute left-4 top-4 text-slate-400"></i>
                <input type="password" id="pass" placeholder="Password" 
                       class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                Sign In <i class="fa fa-arrow-right text-sm"></i>
            </button>
        </div>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-400">OR</span></div>
        </div>

        <button id="googleBtn" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-3">
            <img src="https://img.icons8.com/color/24/000000/google-logo.png" class="w-5 h-5">
            Continue with Google
        </button>
    </div>
</section>


<section id="admin-section" class="hidden min-h-screen flex">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen">
        <div class="p-6 flex items-center gap-3">
            <img src="favicon.png" class="w-8 h-8" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8163/8163149.png'">
            <span class="font-bold text-xl tracking-tight text-blue-600">Go! YNG</span>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button onclick="switchTab(event, 'tab-price')" class="nav-item active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 font-medium transition-all hover:bg-slate-50">
                <i class="fa fa-tag w-5"></i> Price Setup
            </button>
            <button onclick="switchTab(event, 'tab-stock')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 font-medium transition-all hover:bg-slate-50">
                <i class="fa fa-warehouse w-5"></i> Stock Management
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="bg-slate-50 rounded-xl p-4 mb-4">
                <p class="text-xs font-semibold text-slate-400 uppercase">Logged in as</p>
                <p id="headerUserName" class="text-sm font-bold text-slate-700 truncate">Admin User</p>
            </div>
            <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 py-2 text-red-500 hover:bg-red-50 rounded-lg transition-all font-medium">
                <i class="fa fa-power-off"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-10">
            <div>
                <h3 id="greetingText" class="text-xl font-bold text-slate-800">Welcome Back!</h3>
                <p id="currentDate" class="text-xs text-slate-500 font-medium uppercase tracking-wider"></p>
            </div>
            <div class="flex items-center gap-4">
                <div class="h-10 w-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">
                    A
                </div>
            </div>
        </header>

        <div class="p-8">
            <div id="tab-price" class="tab-pane active space-y-8">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i class="fa fa-cog"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Master Price Setup</h3>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Model Name</label>
                            <input type="text" id="mName" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">MRP Price</label>
                            <input type="number" id="mPrice" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Cash Insurance</label>
                            <input type="number" id="mNormalIns" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Finance Insurance</label>
                            <input type="number" id="mFinanceIns" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-2 lg:col-span-4 space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Image URL</label>
                            <input type="text" id="mImg" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <button id="saveModelBtn" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold transition-all shadow-md">
                        Save to Master List
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                        <div class="p-2 bg-slate-50 text-slate-600 rounded-lg"><i class="fa fa-list"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Master Price List</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="px-6 py-4 font-semibold">Image</th>
                                    <th class="px-6 py-4 font-semibold">Model</th>
                                    <th class="px-6 py-4 font-semibold">Price</th>
                                    <th class="px-6 py-4 font-semibold">Insurance</th>
                                    <th class="px-6 py-4 font-semibold">Finance Ins.</th>
                                    <th class="px-6 py-4 font-semibold text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="masterTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-stock" class="tab-pane space-y-8">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><i class="fa fa-plus-circle"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Add Bike to Stock</h3>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Select Model</label>
                            <select id="stockModelSelect" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Registration No</label>
                            <input type="text" id="sRegNo" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Chassis No</label>
                            <input type="text" id="sChassis" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Engine No</label>
                            <input type="text" id="sEngine" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-600">Color</label>
                            <input type="text" id="sColor" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                    </div>

                    <button id="saveStockBtn" class="mt-6 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg font-semibold transition-all shadow-md">
                        Add Stock
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                        <div class="p-2 bg-slate-50 text-slate-600 rounded-lg"><i class="fa fa-warehouse"></i></div>
                        <h3 class="text-lg font-bold text-slate-800">Live Stock</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                    <th class="px-6 py-4 font-semibold">Model</th>
                                    <th class="px-6 py-4 font-semibold">Price</th>
                                    <th class="px-6 py-4 font-semibold">Chassis</th>
                                    <th class="px-6 py-4 font-semibold">Engine</th>
                                    <th class="px-6 py-4 font-semibold">Registration</th>
                                    <th class="px-6 py-4 font-semibold text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="stockTableBody" class="divide-y divide-slate-100 text-sm text-slate-600"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</section>

<script type="module" src="script.js"></script>

<script>
function switchTab(event, id) {
    // Hide all panes
    document.querySelectorAll('.tab-pane').forEach(tab => {
        tab.classList.remove('active');
    });

    // Remove active class from buttons
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.remove('active');
    });

    // Show selected pane
    document.getElementById(id).classList.add('active');

    // Add active class to clicked button
    event.currentTarget.classList.add('active');
}

// Display Current Date
const dateElement = document.getElementById('currentDate');
if(dateElement) {
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    dateElement.textContent = new Date().toLocaleDateString(undefined, options);
}
</script>

</body>
</html>

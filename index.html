<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bajaj Phidim | Price List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        #preloader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #dc2626; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        .hidden-loader { opacity: 0; visibility: hidden; transition: 0.5s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="preloader">
        <div class="loader"></div>
        <p class="mt-4 text-gray-400 font-bold tracking-widest text-xs uppercase">Authenticating...</p>
    </div>

    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 h-16 flex items-center px-4 justify-between">
        <span class="text-2xl font-black text-red-600">BAJAJ</span>
        <button id="open-drawer" class="text-xl p-2"><i class="fa-solid fa-bars-staggered"></i></button>
    </nav>

    <div id="drawer-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden"></div>
    <div id="drawer" class="fixed top-0 left-0 w-64 h-full bg-white z-[70] shadow-2xl transform -translate-x-full transition-transform duration-300 p-6">
        <div class="flex justify-between items-center mb-8">
            <span class="font-bold">MENU</span>
            <button id="close-drawer" class="text-2xl">&times;</button>
        </div>
        <div class="flex flex-col space-y-4">
            <a href="index.html" class="p-2 hover:bg-red-50 rounded">Home</a>
            <a href="#prices" class="p-2 hover:bg-red-50 rounded">Price List</a>
            <a href="login.html" class="p-2 text-red-600 font-bold border-t pt-4">Admin Login</a>
        </div>
    </div>

    <header class="bg-slate-900 text-white py-20 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4">Phidim Showroom</h1>
        <p class="text-slate-400 max-w-lg mx-auto">Latest 2026 Bajaj Price List. Real-time updates directly from our sales office.</p>
    </header>

    <main id="prices" class="max-w-7xl mx-auto px-4 py-16">
        <div id="price-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="border-t py-10 text-center text-gray-400 text-sm">
        <p>&copy; 2026 Authorized Bajaj Partner, Phidim.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBppvBJjKGUv7_n-l_yU2DHTlv-KRZioaI",
            authDomain: "bike-pricelist.firebaseapp.com",
            projectId: "bike-pricelist",
            storageBucket: "bike-pricelist.firebasestorage.app",
            messagingSenderId: "974924440062",
            appId: "1:974924440062:web:1980ccb2b0338dd48460af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Challenge Logic: The Redirect Check
        async function init() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // It's Isaac! Redirect to Dashboard
                    window.location.href = "dashboard.html";
                } else {
                    // It's a Customer! Load the Prices
                    await loadPrices();
                    document.getElementById('preloader').classList.add('hidden-loader');
                }
            });
        }

        async function loadPrices() {
            const container = document.getElementById('price-list-container');
            const snap = await getDocs(collection(db, "bikes"));
            let html = '';
            snap.forEach(doc => {
                const b = doc.data();
                html += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                        <h3 class="text-xl font-bold">${b.model}</h3>
                        <p class="text-2xl text-red-600 font-black mt-2">Rs. ${b.price}</p>
                        <div class="mt-4 flex justify-between text-xs font-bold text-gray-400 uppercase tracking-widest pt-4 border-t">
                            <span>${b.engine}</span>
                            <span class="text-green-500">${b.stock}</span>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || "<p>No prices listed yet.</p>";
        }

        init();

        // Drawer Logic
        const dr = document.getElementById('drawer');
        const ov = document.getElementById('drawer-overlay');
        const toggle = () => { dr.classList.toggle('-translate-x-full'); ov.classList.toggle('hidden'); };
        document.getElementById('open-drawer').onclick = toggle;
        document.getElementById('close-drawer').onclick = toggle;
        ov.onclick = toggle;
    </script>
</body>
</html>

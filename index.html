<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bajaj Phidim | Official Prices</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        #preloader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .loader { width: 48px; height: 48px; border: 5px solid #f3f3f3; border-bottom-color: #dc2626; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="preloader">
        <div class="loader"></div>
        <p class="mt-4 text-gray-400 font-bold text-xs uppercase tracking-widest">Loading Showroom...</p>
    </div>

    <nav class="bg-white border-b sticky top-0 z-50 h-16 flex items-center px-6 justify-between">
        <span class="text-2xl font-black text-red-600">BAJAJ</span>
        <a href="login.html" class="text-gray-400 hover:text-red-600 transition"><i class="fa-solid fa-user-lock"></i></a>
    </nav>

    <header class="bg-slate-900 text-white py-20 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold">Phidim Price List</h1>
        <p class="text-slate-400 mt-2">Check the latest Bajaj prices in real-time.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="price-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBppvBJjKGUv7_n-l_yU2DHTlv-KRZioaI",
            authDomain: "bike-pricelist.firebaseapp.com",
            projectId: "bike-pricelist",
            storageBucket: "bike-pricelist.firebasestorage.app",
            messagingSenderId: "974924440062",
            appId: "1:974924440062:web:1980ccb2b0338dd48460af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchPrices() {
            const container = document.getElementById('price-list-container');
            const preloader = document.getElementById('preloader');
            
            try {
                const snap = await getDocs(collection(db, "bikes"));
                let html = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    html += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-md transition">
                            <h3 class="text-xl font-bold">${b.model}</h3>
                            <p class="text-2xl text-red-600 font-black mt-1">Rs. ${b.price}</p>
                            <p class="text-xs text-gray-400 mt-4 border-t pt-4 font-bold uppercase">${b.engine} | <span class="text-green-600">${b.stock}</span></p>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            } finally {
                preloader.classList.add('fade-out');
            }
        }

        fetchPrices();
    </script>
</body>
</html>
